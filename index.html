<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISTQB Exam Hub Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary-color: #0066cc;
            --success-color: #2ebd59;
            --error-color: #ff3b30;
            --warning-color: #f0a900;
            --text-color: #333;
            --bg-color: #f4f6f9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background: #fff;
            max-width: 800px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            padding: 30px;
            box-sizing: border-box;
        }

        /* Стилі для Головного Меню (Dashboard) */
        .menu-screen h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }
        .exam-section {
            margin-bottom: 25px;
        }
        .exam-section h3 {
            border-bottom: 2px solid #e4e6eb;
            padding-bottom: 8px;
            color: #555;
        }
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .menu-btn {
            background-color: #fff;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .menu-btn:hover {
            background-color: var(--primary-color);
            color: #fff;
        }

        /* Стилі симулятора та таймера */
        .meta-layout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 16px;
            font-weight: 600;
            color: #666;
        }

        .timer-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .timer-box {
            color: var(--text-color);
            background: #e4e6eb;
            padding: 6px 12px;
            border-radius: 6px;
            font-variant-numeric: tabular-nums;
        }
        .timer-box.running {
            background: #ffe5e5;
            color: var(--error-color);
        }

        .control-btn {
            padding: 6px 12px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-start { background-color: var(--success-color); color: white; }
        .btn-pause { background-color: var(--warning-color); color: white; }

        /* Стан блокування інтерфейсу під час паузи */
        .quiz-content.blur {
            filter: blur(5px);
            pointer-events: none;
            user-select: none;
        }

        .image-wrapper {
            background: #ffffff;
            border: 1px solid #e4e6eb;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .question-img {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }

        .options-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .option-btn {
            background-color: #f0f2f5;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn.selected {
            background-color: #e6f0fa;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .nav-layout {
            display: flex;
            justify-content: space-between;
        }

        .next-btn {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-abort { background-color: #8e8e93; }
        .btn-secondary { background-color: #555; margin-bottom: 10px; }

        .result-screen { text-align: center; }
        .score-text { font-size: 44px; font-weight: 800; color: var(--primary-color); margin: 15px 0; }

        .pdf-card {
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
            page-break-inside: avoid;
            background-color: #fff;
        }

        @media (max-width: 576px) {
            body { padding: 10px; }
            .quiz-container { padding: 20px 15px; }
            .grid-menu { grid-template-columns: 1fr; }
            .options-container { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .option-btn { padding: 22px; font-size: 20px; }
        }
		/* Ці стилі спрацюють ТІЛЬКИ всередині PDF-генератора */
@media print {
    body * {
        visibility: hidden;
    }
    #pdf-content, #pdf-content * {
        visibility: visible;
    }
    #pdf-content {
        position: absolute;
        left: 0;
        top: 0;
        width: 100% !important;
        max-width: 100% !important;
        box-sizing: border-box;
        padding: 0 !important;
        margin: 0 !important;
    }
}

/* Забороняємо розривати КАРТКУ навпіл, але дозволяємо їм іти разом */
.pdf-card {
    page-break-inside: avoid !important; /* Для старіших рушіїв */
    break-inside: avoid !important;      /* Сучасний стандарт */
    display: block !important;
    margin-bottom: 15px !important;
}

.report-container {
    display: block !important;
    width: 100% !important;
}
    </style>
</head>
<body>

    <div class="quiz-container" id="quiz-box">
        <div class="menu-screen" id="menu-screen">
            <h1>=== ISTQB EXAM HUB ===</h1>
            
            <div class="exam-section">
                <h3>Official Sample Exams (v4.0)</h3>
                <div class="grid-menu">
                    <button class="menu-btn" onclick="startExamWithConfig('examA')">📋 Exam A (Core 4)</button>
                    <button class="menu-btn" onclick="startExamWithConfig('examB')">📋 Exam B (Template)</button>
                    <button class="menu-btn" onclick="startExamWithConfig('examC')">📋 Exam C (Empty Template)</button>
                    <button class="menu-btn" onclick="startExamWithConfig('examD')">📋 Exam D (Empty Template)</button>
                </div>
            </div>

            <div class="exam-section">
                <h3>Additional Practice</h3>
                <div class="grid-menu">
                    <button class="menu-btn" onclick="startExamWithConfig('extraQ')">⚡ Extra Questions Pack</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // БАНК ДАНИХ ДЛЯ ВСІХ ВЕРСІЙ ЕКЗАМЕНІВ
        const allExams = {
            examA: {
                title: "Official Exam A",
                questions: [
                    { id: 1, image: "ExamA_q1.png", correct: "c" },
                    { id: 2, image: "ExamA_q2.png", correct: "a" },
                    { id: 3, image: "ExamA_q3.png", correct: "a" },
                    { id: 4, image: "ExamA_q4.png", correct: "b" }
                ]
            },
            examB: {
                title: "Official Exam B",
                questions: [
                    { id: 1, image: "ExamB_q1.png", correct: "a" } 
                ]
            },
            examC: { title: "Official Exam C", questions: [] },
            examD: { title: "Official Exam D", questions: [] },
            extraQ: {
                title: "Extra Questions",
                questions: [
                    { id: 21, image: "ExamA_q21.png", correct: "a" },
                    { id: 22, image: "ExamA_q22.png", correct: "c" },
                    { id: 23, image: "ExamA_q23.png", correct: "c" }
                ]
            }
        };

        let initialMenuHtml = "";
        window.addEventListener("DOMContentLoaded", () => {
            initialMenuHtml = document.getElementById("quiz-box").innerHTML;
        });

        let currentExamKey = "";
        let activeQuestions = [];
        let currentQuestionIndex = 0;
        let userAnswers = {};
        
        let timeLeft = 3600; // 60 хвилин
        let timerInterval = null;
        let isTimerRunning = false;

        // Запуск вибраного екзамену
        function startExamWithConfig(examKey) {
            const exam = allExams[examKey];
            if (!exam || !exam.questions || exam.questions.length === 0) {
                alert("This exam repository is currently empty. Add image mappings inside allExams object!");
                return;
            }

            currentExamKey = examKey;
            activeQuestions = exam.questions;
            currentQuestionIndex = 0;
            userAnswers = {};
            timeLeft = 3600;
            isTimerRunning = false;
            if(timerInterval) clearInterval(timerInterval);

            renderQuizLayout();
            showQuestion();
        }

        // Рендер робочої сітки квізу
        function renderQuizLayout() {
            document.getElementById("quiz-box").innerHTML = `
                <div class="meta-layout">
                    <span id="progress-text">Question 1 of X</span>
                    <div class="timer-controls">
                        <button id="timer-control-btn" class="control-btn btn-start" onclick="toggleTimer()">START TIMER</button>
                        <span class="timer-box" id="timer">Time: 60:00</span>
                    </div>
                </div>
                
                <div id="quiz-content-wrapper" class="quiz-content blur">
                    <div class="image-wrapper">
                        <img id="question-image" class="question-img" src="" alt="Question Image">
                    </div>

                    <div class="options-container">
                        <button class="option-btn" onclick="selectOption('a')">A</button>
                        <button class="option-btn" onclick="selectOption('b')">B</button>
                        <button class="option-btn" onclick="selectOption('c')">C</button>
                        <button class="option-btn" onclick="selectOption('d')">D</button>
                    </div>
                </div>

                <div class="nav-layout">
                    <button class="next-btn btn-abort" onclick="exitToMenu()">Exit</button>
                    <button class="next-btn" id="action-btn" onclick="handleNext()">Next</button>
                </div>
            `;
        }

        // Керування станом таймера (Старт / Пауза)
        function toggleTimer() {
            const btn = document.getElementById("timer-control-btn");
            const timerBox = document.getElementById("timer");
            const wrapper = document.getElementById("quiz-content-wrapper");

            if (!isTimerRunning) {
                isTimerRunning = true;
                wrapper.classList.remove("blur");
                timerBox.classList.add("running");
                btn.innerText = "PAUSE";
                btn.className = "control-btn btn-pause";
                
                timerInterval = setInterval(() => {
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        showResults();
                        return;
                    }
                    timeLeft--;
                    const mins = Math.floor(timeLeft / 60);
                    const secs = timeLeft % 60;
                    timerBox.innerText = `Time: ${mins}:${secs < 10 ? '0' : ''}${secs}`;
                }, 1000);
            } else {
                isTimerRunning = false;
                wrapper.classList.add("blur");
                timerBox.classList.remove("running");
                btn.innerText = "RESUME";
                btn.className = "control-btn btn-start";
                clearInterval(timerInterval);
            }
        }

        function showQuestion() {
            const currentQuestion = activeQuestions[currentQuestionIndex];
            document.getElementById("progress-text").innerText = `Question ${currentQuestionIndex + 1} of ${activeQuestions.length}`;
            document.getElementById("question-image").src = currentQuestion.image;

            const buttons = document.querySelectorAll(".option-btn");
            buttons.forEach(btn => btn.classList.remove("selected"));

            const previousAnswer = userAnswers[currentQuestionIndex];
            if (previousAnswer) {
                buttons.forEach(btn => {
                    if (btn.innerText.toLowerCase() === previousAnswer) {
                        btn.classList.add("selected");
                    }
                });
            }

            const actionBtn = document.getElementById("action-btn");
            actionBtn.innerText = (currentQuestionIndex === activeQuestions.length - 1) ? "Finish" : "Next";
        }

        function selectOption(letter) {
            if(!isTimerRunning) return; 
            userAnswers[currentQuestionIndex] = letter;
            const buttons = document.querySelectorAll(".option-btn");
            buttons.forEach(btn => {
                if (btn.innerText.toLowerCase() === letter) {
                    btn.classList.add("selected");
                } else {
                    btn.classList.remove("selected");
                }
            });
        }

        function handleNext() {
            if(!isTimerRunning) {
                alert("Start or Resume the timer to unlock the exam questions!");
                return;
            }
            if (!userAnswers[currentQuestionIndex]) {
                alert("Please select an option before moving next!");
                return;
            }

            if (currentQuestionIndex < activeQuestions.length - 1) {
                currentQuestionIndex++;
                showQuestion();
            } else {
                clearInterval(timerInterval);
                showResults();
            }
        }

function showResults() {
    let score = 0;
    let reportHtml = "";

    activeQuestions.forEach((q, index) => {
        const userAnswer = userAnswers[index] ? userAnswers[index].toUpperCase() : "NO ANSWER";
        const correctAnswer = q.correct.toUpperCase();
        const isCorrect = userAnswers[index] === q.correct;

        if (isCorrect) score++;

        // Оптимізація картинок: якщо картинки до питання немає, блок з нею не буде рендеритись порожнім
        const imageBlock = q.image ? `
            <div style="background: #fff; border: 1px solid #e4e6eb; padding: 8px; border-radius: 6px; margin-bottom: 10px; text-align: center;">
                <img src="${q.image}" crossorigin="anonymous" style="max-width: 100%; max-height: 140px; height: auto; border-radius: 4px; display: inline-block;">
            </div>
        ` : '';

        reportHtml += `
            <div class="pdf-card" style="background-color: ${isCorrect ? '#f6fff8' : '#fff5f5'}; 
                                        border: 2px solid ${isCorrect ? '#2ebd59' : '#ff3b30'};
                                        border-radius: 8px; padding: 15px; margin-bottom: 20px;
                                        page-break-inside: avoid; break-inside: avoid; display: block;">
                <div style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; font-family: Arial, sans-serif;">
                    <span>Question #${q.id}</span>
                    <span style="color: ${isCorrect ? '#2ebd59' : '#ff3b30'}">${isCorrect ? '[✓] CORRECT' : '[✗] INCORRECT'}</span>
                </div>
                ${imageBlock}
                <div style="font-size: 15px; font-family: Arial, sans-serif;">
                    <p style="margin: 4px 0;"><b>Your Answer:</b> <span style="color: ${isCorrect ? '#2ebd59' : '#ff3b30'}; font-weight: bold;">${userAnswer}</span></p>
                    <p style="margin: 4px 0;"><b>Correct Answer:</b> <span style="color: #2ebd59; font-weight: bold;">${correctAnswer}</span></p>
                </div>
            </div>
        `;
    });

    const percent = Math.round((score / activeQuestions.length) * 100);
    const isPassed = percent >= 65;
    const examTitle = allExams[currentExamKey].title;

    document.getElementById("quiz-box").innerHTML = `
        <div class="result-screen">
            <div id="pdf-content" style="padding: 20px; background: #fff; text-align: left; max-width: 750px; margin: 0 auto; box-sizing: border-box;">
                <div style="page-break-inside: avoid; break-inside: avoid; text-align: center; margin-bottom: 20px;">
                    <h2 style="font-family: Arial, sans-serif; color: #0066cc; margin-bottom: 5px; font-size: 26px;">=== ISTQB EXAM REPORT ===</h2>
                    <p style="font-size: 16px; color: #555; margin-top: 0; font-family: Arial, sans-serif;">Exam Version: <b>${examTitle}</b></p>
                    <div style="font-size: 38px; font-weight: 800; color: #0066cc; margin: 10px 0;">Score: ${score} out of ${activeQuestions.length}</div>
                    <p style="font-size: 20px; font-weight: bold; margin-top: 0; font-family: Arial, sans-serif; color: ${isPassed ? '#2ebd59' : '#ff3b30'}">
                        Percentage: ${percent}% — ${isPassed ? 'PASSED 🎉' : 'FAILED ❌'}
                    </p>
                </div>
                
                <hr style="border: 0; border-top: 2px dashed #ccc; margin: 20px 0;">
                
                <div class="report-container" style="display: block; width: 100%;">
                    ${reportHtml}
                </div>
            </div>

            <button class="next-btn btn-secondary" style="width: 100%; margin-top: 15px;" onclick="downloadPDF()">Download PDF Report</button>
            <button class="next-btn" style="width: 100%;" onclick="exitToMenu()">Back to Menu</button>
        </div>
    `;
}

function downloadPDF() {
    const element = document.getElementById('pdf-content');
    if (!element) {
        alert("Error: pdf-content element not found!");
        return;
    }

    const opt = {
        margin:       [12, 12, 12, 12],
        filename:     `ISTQB_${currentExamKey}_Report.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  {
            scale: 2,
            useCORS: true,
            allowTaint: false,
            logging: false,
            letterRendering: true
        },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
        // ЗМІНЕНО ТУТ: тепер використовується розумний внутрішній алгоритм html2pdf
        pagebreak:    { mode: ['avoid-all', 'css'] }
    };

    html2pdf().set(opt).from(element).save();
}

        function exitToMenu() {
            if(timerInterval) clearInterval(timerInterval);
            document.getElementById("quiz-box").innerHTML = initialMenuHtml;
        }
    </script>
</body>
</html>
