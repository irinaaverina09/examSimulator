<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISTQB Exam Hub Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary-color: #0066cc;
            --success-color: #2ebd59;
            --error-color: #ff3b30;
            --warning-color: #f0a900;
            --text-color: #333;
            --bg-color: #f4f6f9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background: #fff;
            max-width: 800px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            padding: 30px;
            box-sizing: border-box;
        }

        .menu-screen h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }
        .exam-section {
            margin-bottom: 25px;
        }
        .exam-section h3 {
            border-bottom: 2px solid #e4e6eb;
            padding-bottom: 8px;
            color: #555;
        }
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .menu-btn {
            background-color: #fff;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .menu-btn:hover {
            background-color: var(--primary-color);
            color: #fff;
        }

        .meta-layout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 16px;
            font-weight: 600;
            color: #666;
        }

        .timer-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .timer-box {
            color: var(--text-color);
            background: #e4e6eb;
            padding: 6px 12px;
            border-radius: 6px;
            font-variant-numeric: tabular-nums;
        }
        .timer-box.running {
            background: #ffe5e5;
            color: var(--error-color);
        }

        .control-btn {
            padding: 6px 12px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-start { background-color: var(--success-color); color: white; }
        .btn-pause { background-color: var(--warning-color); color: white; }

        .quiz-content.blur {
            filter: blur(5px);
            pointer-events: none;
            user-select: none;
        }

        .image-wrapper {
            background: #ffffff;
            border: 1px solid #e4e6eb;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .question-img {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }

        .options-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .option-btn {
            background-color: #f0f2f5;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn.selected {
            background-color: #e6f0fa;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .nav-layout {
            display: flex;
            justify-content: space-between;
        }

        .next-btn {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-abort { background-color: #8e8e93; }
        .btn-secondary { background-color: #555; margin-bottom: 10px; }

        .result-screen { text-align: center; }
        .pdf-card {
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
            page-break-inside: avoid;
            background-color: #fff;
        }
    </style>
</head>
<body>

    <div class="quiz-container" id="quiz-box">
        <div class="menu-screen" id="menu-screen">
            <h1>=== ISTQB EXAM HUB ===</h1>
            
            <div class="exam-section">
                <h3>Official Sample Exams</h3>
                <div class="grid-menu">
                    <button class="menu-btn" onclick="startExamWithConfig('examA')">📋 Exam A Foundation Level v4.0</button>
                    <button class="menu-btn" onclick="startExamWithConfig('examB')">📋 Exam B Foundation Level v4.0 (Empty Template)</button>
                    <button class="menu-btn" onclick="startExamWithConfig('examC')">📋 Exam C Foundation Level v4.0 (Empty Template)</button>
                    <button class="menu-btn" onclick="startExamWithConfig('examD')">📋 Exam D Foundation Level v4.0 (Empty Template)</button>
                </div>
            </div>

            <div class="exam-section">
                <h3>Additional Practice</h3>
                <div class="grid-menu">
                    <button class="menu-btn" onclick="startExamWithConfig('extraQ')">⚡ Extra Questions A Pack</button>
                </div>
            </div>
        </div>
    </div>

]
            },
            examB: {
                title: "Official Exam B",
                questions: [
                    { id: 1, image: "ExamB_q1.png", correct: "a" } 
                ]
            },
            examC: { title: "Official Exam C",
			    questions: [
                    { id: 1, image: "ExamA_q1.png", correct: "c" },
                    { id: 2, image: "ExamA_q2.png", correct: "a" },
                    { id: 3, image: "ExamA_q3.png", correct: "a" },
                    { id: 4, image: "ExamA_q4.png", correct: "b" }
                ]
			},
            examD: { title: "Official Exam D",
    questions: [
                    { id: 1, image: "ExamA_q1.png", correct: "c" },
                    { id: 2, image: "ExamA_q2.png", correct: "a" },
                    { id: 3, image: "ExamA_q3.png", correct: "a" },
                    { id: 4, image: "ExamA_q4.png", correct: "b" }
                ]			},
            extraQ: {
                title: "Extra Questions",
questions: [
    { id: "A1", image: "ExamA_addQ1.png", correct: "a" },
    { id: "A2", image: "ExamA_addQ2.png", correct: "d" },
    { id: "A3", image: "ExamA_addQ3.png", correct: "d" },

    { id: "A12", image: "ExamA_addQ12.png", correct: "d" },
    { id: "A13", image: "ExamA_addQ13.png", correct: "b" },
    { id: "A14", image: "ExamA_addQ14.png", correct: "b" },
    { id: "A15", image: "ExamA_addQ15.png", correct: "c" },
    { id: "A16", image: "ExamA_addQ16.png", correct: "d" },
    { id: "A17", image: "ExamA_addQ17.png", correct: "c" },
    { id: "A18", image: "ExamA_addQ18.png", correct: "b" },
    { id: "A19", image: "ExamA_addQ19.png", correct: "d" },
    { id: "A20", image: "ExamA_addQ20.png", correct: "b" },
    { id: "A21", image: "ExamA_addQ21.png", correct: "a" },
    { id: "A22", image: "ExamA_addQ22.png", correct: "c" },
    { id: "A23", image: "ExamA_addQ23.png", correct: "a" },
    { id: "A24", image: "ExamA_addQ24.png", correct: "d" },
    { id: "A25", image: "ExamA_addQ25.png", correct: "a, d" },
    { id: "A26", image: "ExamA_addQ26.png", correct: "b" }
]
            }
        };
        let initialMenuHtml = "";
        window.addEventListener("DOMContentLoaded", () => { initialMenuHtml = document.getElementById("quiz-box").innerHTML; });

        let currentExamKey = "", activeQuestions = [], currentQuestionIndex = 0, userAnswers = {}, timeLeft = 3600, timerInterval = null, isTimerRunning = false;

        function startExamWithConfig(examKey) {
            currentExamKey = examKey;
            activeQuestions = allExams[examKey].questions;
            currentQuestionIndex = 0;
            userAnswers = {};
            timeLeft = 3600;
            isTimerRunning = false;
            renderQuizLayout();
            showQuestion();
        }

        function renderQuizLayout() {
            document.getElementById("quiz-box").innerHTML = `
                <div class="meta-layout">
                    <span id="progress-text"></span>
                    <div class="timer-controls">
                        <button id="timer-control-btn" class="control-btn btn-start" onclick="toggleTimer()">START TIMER</button>
                        <span class="timer-box" id="timer">Time: 60:00</span>
                    </div>
                </div>
                <div id="quiz-content-wrapper" class="quiz-content blur">
                    <div class="image-wrapper"><img id="question-image" class="question-img" src="" alt="Q"></div>
                    <div class="options-container">
                        <button class="option-btn" onclick="selectOption('a')">A</button>
                        <button class="option-btn" onclick="selectOption('b')">B</button>
                        <button class="option-btn" onclick="selectOption('c')">C</button>
                        <button class="option-btn" onclick="selectOption('d')">D</button>
                        <button class="option-btn" onclick="selectOption('e')">E</button>
                    </div>
                </div>
                <div class="nav-layout">
                    <button class="next-btn btn-abort" onclick="exitToMenu()">Exit</button>
                    <button class="next-btn" id="action-btn" onclick="handleNext()">Next</button>
                </div>
            `;
        }

        function toggleTimer() { /* ... логіка без змін ... */ }

        function showQuestion() {
            const q = activeQuestions[currentQuestionIndex];
            document.getElementById("progress-text").innerText = `Question ${currentQuestionIndex + 1} of ${activeQuestions.length}`;
            document.getElementById("question-image").src = q.image;
            
            const currentSelected = userAnswers[currentQuestionIndex] || [];
            document.querySelectorAll(".option-btn").forEach(btn => {
                btn.classList.toggle("selected", currentSelected.includes(btn.innerText.toLowerCase()));
            });
            document.getElementById("action-btn").innerText = (currentQuestionIndex === activeQuestions.length - 1) ? "Finish" : "Next";
        }

        function selectOption(letter) {
            if(!isTimerRunning) return;
            if (!userAnswers[currentQuestionIndex]) userAnswers[currentQuestionIndex] = [];
            const arr = userAnswers[currentQuestionIndex];
            const idx = arr.indexOf(letter);
            idx > -1 ? arr.splice(idx, 1) : arr.push(letter);
            showQuestion();
        }

        function handleNext() {
            if (!userAnswers[currentQuestionIndex] || userAnswers[currentQuestionIndex].length === 0) { alert("Select at least one!"); return; }
            if (currentQuestionIndex < activeQuestions.length - 1) { currentQuestionIndex++; showQuestion(); }
            else { clearInterval(timerInterval); showResults(); }
        }

        function showResults() {
            let score = 0;
            let reportHtml = "";
            activeQuestions.forEach((q, index) => {
                const uArr = (userAnswers[index] || []).sort();
                const cArr = q.correct.replace(/\s/g, '').split(',').sort();
                const isCorrect = JSON.stringify(uArr) === JSON.stringify(cArr);
                if (isCorrect) score++;
                reportHtml += `<div class="pdf-card" style="border: 2px solid ${isCorrect ? '#2ebd59' : '#ff3b30'}">
                    <p><b>Q${q.id}</b>: ${isCorrect ? 'Correct' : 'Incorrect'}</p>
                    <p>Your: ${uArr.join(', ').toUpperCase()} | Correct: ${cArr.join(', ').toUpperCase()}</p>
                </div>`;
            });
            document.getElementById("quiz-box").innerHTML = `<h2>Score: ${score}/${activeQuestions.length}</h2>` + reportHtml + `<button onclick="location.reload()">Menu</button>`;
        }
        function exitToMenu() { location.reload(); }
    </script>
</body>
</html>
