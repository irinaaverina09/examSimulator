<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISTQB Exam Simulator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .quiz-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 750px; text-align: center; }
        .header-box { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f0f2f5; padding-bottom: 15px; margin-bottom: 20px; }
        .progress { font-size: 16px; color: #65676b; font-weight: 600; }
        .timer { font-size: 18px; color: #dc3545; font-weight: bold; background: #ffeef0; padding: 6px 12px; border-radius: 20px; }
        .image-wrapper { background: #fff; border: 1px solid #e4e6eb; border-radius: 8px; padding: 10px; margin-bottom: 25px; min-height: 200px; display: flex; justify-content: center; align-items: center; }
        .question-img { max-width: 100%; height: auto; display: block; border-radius: 4px; }
        .options-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .option-btn { padding: 15px; font-size: 18px; font-weight: bold; background: #f0f2f5; border: 2px solid transparent; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; color: #050505; }
        .option-btn:hover { background: #e4e6eb; }
        .option-btn.selected { background: #e7f3ff; border-color: #1877f2; color: #1877f2; }
        .controls { display: flex; justify-content: flex-end; }
        .next-btn { padding: 12px 30px; background: #1877f2; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; transition: background 0.2s; }
        .next-btn:hover { background: #1466d2; }
        .hidden { display: none; }
        .result-title { color: #1c1e21; margin-bottom: 10px; }
        .score { font-size: 48px; font-weight: bold; color: #24a0ed; margin: 20px 0; }
        .score.pass { color: #2e7d32; }
        .score.fail { color: #c62828; }
        .status-text { font-size: 20px; font-weight: 600; margin-bottom: 30px; }
        .download-btn { padding: 14px 25px; background: #2e7d32; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; }
        .download-btn:hover { background: #235e26; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-box">
        <div class="header-box">
            <div id="progress-text" class="progress">Question 1 of 40</div>
            <div id="timer-text" class="timer">Time: 60:00</div>
        </div>
        
        <div class="image-wrapper">
            <img id="question-image" class="question-img" src="" alt="Question Image">
        </div>
        
        <div class="options-container">
            <button class="option-btn" onclick="selectOption('a')">A</button>
            <button class="option-btn" onclick="selectOption('b') font-weight:bold;">B</button>
            <button class="option-btn" onclick="selectOption('c')">C</button>
            <button class="option-btn" onclick="selectOption('d')">D</button>
        </div>
        
        <div class="controls">
            <button id="next-button" class="next-btn" onclick="nextQuestion()">Next</button>
        </div>
    </div>

    <div id="result-box" class="hidden">
        <h2 class="result-title">Exam Completed!</h2>
        <div id="final-score" class="score">0 / 0</div>
        <div id="pass-status" class="status-text"></div>
        <button class="download-btn" onclick="downloadReport()">Download Exam Report (.txt)</button>
    </div>
</div>

<script>
    // --- КАРТА ВІДПОВІДЕЙ ТА КАРТИНOK ---
    // Сюди просто пропиши назви своїх скриншотів та букви правильних відповідей!
    const quizData = [
        { id: 1, image: "q1.png", correct: "c" },
        { id: 2, image: "q2.png", correct: "a" },
        { id: 3, image: "q3.png", correct: "b" },
        { id: 4, image: "q4.png", correct: "d" }
        // Ти можеш легко додати сюди всі 40 питань за аналогією
    ];

    let currentIdx = 0;
    let userAnswers = [];
    let selectedLetter = null;
    let timeLeft = 3600; // 60 хвилин у секундах
    let timerTimer;

    function startTimer() {
        timerTimer = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timerTimer);
                finishExam();
            } else {
                timeLeft--;
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                document.getElementById('timer-text').innerText = `Time: ${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }
        }, 1000);
    }

    function renderQuestion() {
        selectedLetter = null;
        // Скидаємо виділення з кнопок
        document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
        
        const currentQuestion = quizData[currentIdx];
        document.getElementById('progress-text').innerText = `Question ${currentIdx + 1} of ${quizData.length}`;
        document.getElementById('question-image').src = currentQuestion.image;
        
        // Якщо це останнє питання, міняємо текст кнопки
        if (currentIdx === quizData.length - 1) {
            document.getElementById('next-button').innerText = "Finish Exam";
        }
    }

    function selectOption(letter) {
        selectedLetter = letter;
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => {
            if(btn.innerText.toLowerCase() === letter) {
                btn.classList.add('selected');
            } else {
                btn.classList.remove('selected');
            }
        });
    }

    function nextQuestion() {
        if (!selectedLetter) {
            alert("Please select an answer before moving to the next question!");
            return;
        }

        // Записуємо вибір користувача
        userAnswers.push({
            id: quizData[currentIdx].id,
            userAnswer: selectedLetter,
            correctAnswer: quizData[currentIdx].correct,
            isCorrect: selectedLetter === quizData[currentIdx].correct
        });

        currentIdx++;

        if (currentIdx < quizData.length) {
            renderQuestion();
        } else {
            finishExam();
        }
    }

    function finishExam() {
        clearInterval(timerTimer);
        document.getElementById('quiz-box').classList.add('hidden');
        document.getElementById('result-box').classList.remove('hidden');

        // Рахуємо бали
        let correctCount = userAnswers.filter(ans => ans.isCorrect).length;
        let totalQuestions = quizData.length;
        let percentage = Math.round((correctCount / totalQuestions) * 100);
        
        const scoreElement = document.getElementById('final-score');
        scoreElement.innerText = `${correctCount} / ${totalQuestions}`;

        const statusElement = document.getElementById('pass-status');
        // Прохідний бал ISTQB — 65%
        if (percentage >= 65) {
            statusElement.innerText = `PASSED (${percentage}%) - Congratulations!`;
            statusElement.className = "status-text pass";
            scoreElement.className = "score pass";
        } else {
            statusElement.innerText = `FAILED (${percentage}%) - Required: 65%`;
            statusElement.className = "status-text fail";
            scoreElement.className = "score fail";
        }
    }

    function downloadReport() {
        let correctCount = userAnswers.filter(ans => ans.isCorrect).length;
        let reportText = `=== ISTQB EXAM REPORT ===\r\n`;
        reportText += `Score: ${correctCount} out of ${quizData.length}\r\n`;
        reportText += `Percentage: ${Math.round((correctCount / quizData.length) * 100)}%\r\n`;
        reportText += `=========================\r\n\r\n`;

        userAnswers.forEach((ans, index) => {
            let status = ans.isCorrect ? "[✓] CORRECT" : "[✗] INCORRECT";
            reportText += `Question #${ans.id}: ${status}\r\n`;
            reportText += `Your Answer: ${ans.userAnswer.toUpperCase()}\r\n`;
            reportText += `Correct Answer: ${ans.correctAnswer.toUpperCase()}\r\n`;
            reportText += `-------------------------\r\n`;
        });

        // Створення та скачування файлу без сервера
        const blob = new Blob([reportText], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `ISTQB_Exam_Report.txt`;
        link.click();
    }

    // Старт симулятора
    startTimer();
    renderQuestion();
</script>

</body>
</html>
