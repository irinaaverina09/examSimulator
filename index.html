<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISTQB Exam Hub Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary-color: #0066cc;
            --success-color: #2ebd59;
            --error-color: #ff3b30;
            --warning-color: #f0a900;
            --text-color: #333;
            --bg-color: #f4f6f9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background: #fff;
            max-width: 800px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            padding: 30px;
            box-sizing: border-box;
        }

        .menu-screen h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .exam-section {
            margin-bottom: 25px;
        }

        .exam-section h3 {
            border-bottom: 2px solid #e4e6eb;
            padding-bottom: 8px;
            color: #555;
        }

        .grid-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .menu-btn {
            background-color: #fff;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .menu-btn:hover {
            background-color: var(--primary-color);
            color: #fff;
        }

        .meta-layout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 16px;
            font-weight: 600;
            color: #666;
        }

        .timer-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .timer-box {
            color: var(--text-color);
            background: #e4e6eb;
            padding: 6px 12px;
            border-radius: 6px;
            font-variant-numeric: tabular-nums;
        }

        .timer-box.running {
            background: #ffe5e5;
            color: var(--error-color);
        }

        .control-btn {
            padding: 6px 12px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-start {
            background-color: var(--success-color);
            color: white;
        }

        .btn-pause {
            background-color: var(--warning-color);
            color: white;
        }

        .quiz-content.blur {
            filter: blur(5px);
            pointer-events: none;
            user-select: none;
        }

        .image-wrapper {
            background: #ffffff;
            border: 1px solid #e4e6eb;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
        }

        .question-img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }

        .options-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .option-btn {
            background-color: #f0f2f5;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .option-btn.selected {
            background-color: #e6f0fa;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .nav-layout {
            display: flex;
            justify-content: space-between;
        }

        .next-btn {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-abort {
            background-color: #8e8e93;
        }

        .btn-secondary {
            background-color: #555;
            margin-bottom: 10px;
            width: 100%;
        }

        @media (max-width: 576px) {
            .grid-menu {
                grid-template-columns: 1fr;
            }

            .options-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>

    <div class="quiz-container" id="quiz-box">
        <div class="menu-screen" id="menu-screen">
            <h1>=== ISTQB EXAM HUB ===</h1>
            <div class="exam-section">
                <h3>Official Sample Exams</h3>
                <div class="grid-menu">
                    <button class="menu-btn" onclick="startExamWithConfig('examA')">📋 Exam A</button>
                    <button class="menu-btn" onclick="startExamWithConfig('examB')">📋 Exam B</button>
                    <button class="menu-btn" onclick="startExamWithConfig('examC')">📋 Exam C</button>
                    <button class="menu-btn" onclick="startExamWithConfig('examD')">📋 Exam D</button>
                </div>
            </div>
            <div class="exam-section">
                <h3>Additional Practice</h3>
                <div class="grid-menu">
                    <button class="menu-btn" onclick="startExamWithConfig('extraQ')">⚡ Extra Questions A Pack</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const allExams = {

    { id: 12, image: "ExamA_q12.png", correct: "c" },
    { id: 13, image: "ExamA_q13.png", correct: "a" },
    { id: 14, image: "ExamA_q14.png", correct: "b" },

    { id: 22, image: "ExamA_q22.png", correct: "d" },
    { id: 23, image: "ExamA_q23.png", correct: "d" },
    { id: 24, image: "ExamA_q24.png", correct: "a" },
    { id: 25, image: "ExamA_q25.png", correct: "d" },
    { id: 26, image: "ExamA_q26.png", correct: "a" },
    { id: 27, image: "ExamA_q27.png", correct: "c" },
    { id: 28, image: "ExamA_q28.png", correct: "b" },
    { id: 29, image: "ExamA_q29.png", correct: "a" },
    { id: 30, image: "ExamA_q30.png", correct: "c" },
    { id: 31, image: "ExamA_q31.png", correct: "c, e" },
    { id: 32, image: "ExamA_q32.png", correct: "d" },
    { id: 33, image: "ExamA_q33.png", correct: "a" },
    { id: 34, image: "ExamA_q34.png", correct: "a" },
    { id: 35, image: "ExamA_q35.png", correct: "c" },

    { id: 37, image: "ExamA_q37.png", correct: "c" },
    { id: 38, image: "ExamA_q38.png", correct: "c" },
    { id: 39, image: "ExamA_q39.png", correct: "c" },
    { id: 40, image: "ExamA_q40.png", correct: "b" }
			] },
            examB: { title: "Official Exam B", questions: [{ id: 1, image: "ExamB_q1.png", correct: "a" }] },
            examC: { title: "Official Exam C", questions: [{ id: 1, image: "ExamA_q1.png", correct: "c" }] },
            examD: { title: "Official Exam D", questions: [{ id: 1, image: "ExamA_q1.png", correct: "c" }] },
            extraQ: { title: "Extra Questions", questions: [
			{ id: "A1", image: "ExamA_addQ1.png", correct: "a" },
    { id: "A2", image: "ExamA_addQ2.png", correct: "d" },
    { id: "A3", image: "ExamA_addQ3.png", correct: "d" },
    { id: "A4", image: "ExamA_addQ4.png", correct: "d" },
    { id: "A5", image: "ExamA_addQ5.png", correct: "c" },
    { id: "A6", image: "ExamA_addQ6.png", correct: "d" },
    { id: "A7", image: "ExamA_addQ7.png", correct: "b, c" },
    { id: "A8", image: "ExamA_addQ8.png", correct: "c" },
    { id: "A9", image: "ExamA_addQ9.png", correct: "b" },
    { id: "A10", image: "ExamA_addQ10.png", correct: "a" },
    { id: "A11", image: "ExamA_addQ11.png", correct: "c" },
    { id: "A12", image: "ExamA_addQ12.png", correct: "d" },
    { id: "A13", image: "ExamA_addQ13.png", correct: "b" },
    { id: "A14", image: "ExamA_addQ14.png", correct: "b" },
    { id: "A15", image: "ExamA_addQ15.png", correct: "c" },
    { id: "A16", image: "ExamA_addQ16.png", correct: "d" },
    { id: "A17", image: "ExamA_addQ17.png", correct: "c" },
    { id: "A18", image: "ExamA_addQ18.png", correct: "b" },
    { id: "A19", image: "ExamA_addQ19.png", correct: "d" },
    { id: "A20", image: "ExamA_addQ20.png", correct: "b" },
    { id: "A21", image: "ExamA_addQ21.png", correct: "a" },
    { id: "A22", image: "ExamA_addQ22.png", correct: "c" },
    { id: "A23", image: "ExamA_addQ23.png", correct: "a" },
    { id: "A24", image: "ExamA_addQ24.png", correct: "d" },
    { id: "A25", image: "ExamA_addQ25.png", correct: "a, d" },
    { id: "A26", image: "ExamA_addQ26.png", correct: "b" }
			] }
        };

        let initialMenuHtml = document.getElementById("quiz-box").innerHTML;
        let currentExamKey = "", activeQuestions = [], currentQuestionIndex = 0, userAnswers = {}, timeLeft = 3600, timerInterval = null, isTimerRunning = false;

        function startExamWithConfig(examKey) {
            const exam = allExams[examKey];
            currentExamKey = examKey;
            activeQuestions = exam.questions;
            currentQuestionIndex = 0; userAnswers = {}; timeLeft = 3600; isTimerRunning = false;
            renderQuizLayout();
            showQuestion();
        }

        function renderQuizLayout() {
            document.getElementById("quiz-box").innerHTML = `
                <div class="meta-layout">
                    <span id="progress-text"></span>
                    <div class="timer-controls">
                        <button id="timer-control-btn" class="control-btn btn-start" onclick="toggleTimer()">START</button>
                        <span class="timer-box" id="timer">60:00</span>
                    </div>
                </div>
                <div id="quiz-content-wrapper" class="quiz-content blur">
                    <div class="image-wrapper"><img id="question-image" class="question-img" src="" alt="Question"></div>
                    <div class="options-container">
                        <button class="option-btn" onclick="selectOption('a')">A</button>
                        <button class="option-btn" onclick="selectOption('b')">B</button>
                        <button class="option-btn" onclick="selectOption('c')">C</button>
                        <button class="option-btn" onclick="selectOption('d')">D</button>
                    </div>
                </div>
                <div class="nav-layout">
                    <button class="next-btn btn-abort" onclick="exitToMenu()">Exit</button>
                    <button class="next-btn" id="action-btn" onclick="handleNext()">Next</button>
                </div>
            `;
        }

        function toggleTimer() {
            const btn = document.getElementById("timer-control-btn");
            const timerBox = document.getElementById("timer");
            const wrapper = document.getElementById("quiz-content-wrapper");

            if (!isTimerRunning) {
                isTimerRunning = true;
                wrapper.classList.remove("blur");
                timerBox.classList.add("running");
                btn.innerText = "PAUSE";
                btn.className = "control-btn btn-pause";
                timerInterval = setInterval(() => {
                    if (timeLeft <= 0) { clearInterval(timerInterval); showResults(); return; }
                    timeLeft--;
                    timerBox.innerText = `${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2, '0')}`;
                }, 1000);
            } else {
                isTimerRunning = false;
                wrapper.classList.add("blur");
                timerBox.classList.remove("running");
                btn.innerText = "RESUME";
                btn.className = "control-btn btn-start";
                clearInterval(timerInterval);
            }
        }

        function showQuestion() {
            const q = activeQuestions[currentQuestionIndex];
            document.getElementById("progress-text").innerText = `Q ${currentQuestionIndex + 1}/${activeQuestions.length}`;
            document.getElementById("question-image").src = q.image;
            document.querySelectorAll(".option-btn").forEach(btn => {
                btn.classList.toggle("selected", (userAnswers[currentQuestionIndex] || []).includes(btn.innerText.toLowerCase()));
            });
            document.getElementById("action-btn").innerText = (currentQuestionIndex === activeQuestions.length - 1) ? "Finish" : "Next";
        }

        function selectOption(letter) {
            if(!isTimerRunning) return;
            if (!userAnswers[currentQuestionIndex]) userAnswers[currentQuestionIndex] = [];
            const ans = userAnswers[currentQuestionIndex];
            const idx = ans.indexOf(letter);
            idx > -1 ? ans.splice(idx, 1) : ans.push(letter);
            showQuestion();
        }

        function handleNext() {
            if(!isTimerRunning) { alert("Start timer first!"); return; }
            if (!(userAnswers[currentQuestionIndex] && userAnswers[currentQuestionIndex].length > 0)) { alert("Select an answer!"); return; }
            if (currentQuestionIndex < activeQuestions.length - 1) { currentQuestionIndex++; showQuestion(); } 
            else { clearInterval(timerInterval); showResults(); }
        }

        function showResults() {
            // (Логіка відображення результатів залишилась без змін)
            document.getElementById("quiz-box").innerHTML = "<h2>Exam Finished! Check console for results or implement custom logic.</h2>";
        }

        function exitToMenu() { clearInterval(timerInterval); document.getElementById("quiz-box").innerHTML = initialMenuHtml; }
    </script>
</body>

</html>
